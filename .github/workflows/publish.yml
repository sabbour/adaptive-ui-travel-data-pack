name: Publish Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npx tsc -b --noEmit

      - name: Publish @sabbour/adaptive-ui-travel-data-pack
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "${NAME}@${VERSION}" version 2>/dev/null; then
            echo "✓ ${NAME}@${VERSION} already published — skipping"
          else
            npm publish
            echo "✓ Published ${NAME}@${VERSION}"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify parent workspace
        if: ${{ success() }}
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ADAPTIVE_UI_DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/adaptive-ui
          event-type: submodule-updated
          client-payload: '{"sourceRepo":"${{ github.repository }}","tag":"${{ github.ref_name }}","package":"travel-data-pack"}'
